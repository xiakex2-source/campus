<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HBEU Logo Motion</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #ffffff;
      --surface: #f5f5f3;
      --border: rgba(0,0,0,0.08);
      --text-primary: #0d0d0d;
      --text-secondary: #777;
      --text-tertiary: #aaa;
      --accent: #e64036;
      --speed-progress: 9%;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      padding: 2rem;
    }

    #logo-root {
      width: min(92vw, 896px);
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: visible;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    #logo-root svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
      text-rendering: geometricPrecision;
    }

    .atomic-motions {
      display: flex;
      gap: 1.5rem;
      align-items: flex-end;
      justify-content: center;
      flex-wrap: wrap;
    }

    .atom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .atom-stage {
      width: 74px;
      height: 74px;
      display: grid;
      place-items: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .atom-stage img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 260ms cubic-bezier(0.34,1.56,0.64,1);
      transform-origin: center;
    }

    .atom-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      white-space: nowrap;
    }

    .principles {
      max-width: 760px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .pill {
      font-size: 11px;
      line-height: 1;
      padding: 5px 10px;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
      white-space: nowrap;
    }

    .pill.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    button {
      font: 12px/1.2 inherit;
      letter-spacing: 0.04em;
      padding: 8px 18px;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      background: transparent;
      color: var(--text-primary);
      cursor: pointer;
    }

    button.primary {
      color: var(--bg);
      background: var(--text-primary);
      border-color: var(--text-primary);
    }

    .speed-control {
      width: min(340px, 80vw);
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border: 0.5px solid var(--border);
      border-radius: 999px;
      color: var(--text-secondary);
    }

    .speed-caption,
    .speed-value {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .speed-value {
      min-width: 46px;
      text-align: right;
      color: var(--text-primary);
      text-transform: none;
      font-variant-numeric: tabular-nums;
    }

    input[type="range"] {
      flex: 1;
      min-width: 120px;
      height: 24px;
      appearance: none;
      -webkit-appearance: none;
      background: transparent;
      cursor: grab;
      accent-color: var(--accent);
    }

    input[type="range"]::-webkit-slider-runnable-track {
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(to right, var(--accent) 0%, var(--accent) var(--speed-progress), var(--border) var(--speed-progress), var(--border) 100%);
    }

    input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      margin-top: -6.5px;
      border-radius: 50%;
      border: 2px solid var(--bg);
      background: var(--accent);
      box-shadow: 0 1px 6px rgba(0,0,0,0.18);
    }

    .footer {
      font-size: 11px;
      color: var(--text-tertiary);
      text-align: center;
      line-height: 1.7;
    }

    .p2m-chromeless .atomic-motions,
    .p2m-chromeless .principles,
    .p2m-chromeless .controls,
    .p2m-chromeless .footer {
      display: none;
    }

    .p2m-chromeless body {
      min-height: 100vh;
      gap: 0;
      padding: 0;
      background: transparent;
    }

    .p2m-chromeless #logo-root {
      width: min(76vw, 560px);
      background: transparent;
      filter: drop-shadow(0 18px 36px rgba(20, 84, 178, 0.12));
    }

    .p2m-chromeless,
    .p2m-chromeless body {
      background: transparent !important;
    }

    @media (prefers-reduced-motion: reduce) {
      * {
        animation: none !important;
        transition: none !important;
      }
    }

    @media (prefers-reduced-motion: no-preference) {
          :root {
            --p2m-duration: 1900ms;
            --p2m-ease-enter: cubic-bezier(0.34, 0, 0.14, 1);
            --p2m-ease-settle: cubic-bezier(0.16, 1, 0.3, 1);
            --p2m-ease-ring: cubic-bezier(0.4, 0, 0.2, 1);
            --p2m-overshoot: 1.018;
          }

          #logo-root svg {
            transform-box: fill-box;
            transform-origin: center;
            animation: p2m-stage var(--p2m-duration) var(--p2m-ease-enter) both;
            will-change: transform, opacity, filter;
          }

          #outer-ring, #inner-ring {
            stroke-dasharray: 1;
            stroke-dashoffset: 1;
            transform-box: fill-box;
            transform-origin: center;
            animation: p2m-ring var(--p2m-duration) var(--p2m-ease-ring) both;
            will-change: stroke-dashoffset, opacity, transform;
          }

          #inner-ring {
            animation-name: p2m-ring-inner;
          }

          #wordmark-cn, #wordmark-en, #year-1943 {
            transform-box: fill-box;
            transform-origin: center;
            animation: p2m-text-reveal var(--p2m-duration) cubic-bezier(0.16, 1, 0.3, 1) both;
            will-change: opacity, transform;
          }

          #wordmark-en {
            animation-name: p2m-en-reveal;
          }

          #year-1943 {
            animation-name: p2m-year-reveal;
          }

          .tower {
            transform-box: fill-box;
            transform-origin: bottom center;
            animation: p2m-tower-rise 1280ms cubic-bezier(0.16, 1, 0.3, 1) both;
            animation-delay: calc(360ms + var(--i) * 23ms);
            will-change: opacity, transform;
          }

          .wave {
            transform-box: fill-box;
            transform-origin: center;
            animation: p2m-wave-flow var(--p2m-duration) cubic-bezier(0.16, 1, 0.3, 1) both;
            will-change: opacity, transform;
          }

          #wave-bottom {
            animation-name: p2m-wave-flow-bottom;
          }

          @keyframes p2m-stage {
            0% { opacity: 0; transform: scale(0.94) translateY(18px); filter: blur(8px); animation-timing-function: cubic-bezier(0.34, 0, 0.14, 1); }
            12% { opacity: 0.22; transform: scale(0.915) translateY(24px); filter: blur(5px); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            54% { opacity: 1; transform: scale(var(--p2m-overshoot)) translateY(-4px); filter: blur(0); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            78% { transform: scale(0.996) translateY(1px); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
          }

          @keyframes p2m-ring {
            0% { opacity: 0; stroke-dashoffset: 1; transform: rotate(-18deg) scale(0.985); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            8% { opacity: 1; stroke-dashoffset: 1; transform: rotate(-12deg) scale(0.985); animation-timing-function: cubic-bezier(0.34, 0, 0.14, 1); }
            52% { opacity: 1; stroke-dashoffset: 0; transform: rotate(1.4deg) scale(1.004); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            82% { stroke-dashoffset: 0; transform: rotate(0deg) scale(1); }
            100% { opacity: 1; stroke-dashoffset: 0; transform: rotate(0deg) scale(1); }
          }

          @keyframes p2m-ring-inner {
            0% { opacity: 0; stroke-dashoffset: 1; transform: rotate(16deg) scale(0.98); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            11% { opacity: 1; stroke-dashoffset: 1; transform: rotate(12deg) scale(0.98); animation-timing-function: cubic-bezier(0.34, 0, 0.14, 1); }
            57% { opacity: 1; stroke-dashoffset: 0; transform: rotate(-1deg) scale(1.004); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            84% { stroke-dashoffset: 0; transform: rotate(0deg) scale(1); }
            100% { opacity: 1; stroke-dashoffset: 0; transform: rotate(0deg) scale(1); }
          }

          @keyframes p2m-text-reveal {
            0%, 20% { opacity: 0; transform: translateY(-13px) scale(0.985); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            50% { opacity: 1; transform: translateY(2px) scale(1.006); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            78% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
          }

          @keyframes p2m-en-reveal {
            0%, 28% { opacity: 0; transform: translateY(18px) scale(0.985); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            62% { opacity: 1; transform: translateY(-2px) scale(1.004); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            86% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
          }

          @keyframes p2m-year-reveal {
            0%, 48% { opacity: 0; transform: translateY(12px) scale(0.96); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            72% { opacity: 1; transform: translateY(-1px) scale(1.02); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
          }

          @keyframes p2m-tower-rise {
            0% { opacity: 0; transform: scaleY(0.06) translateY(36px); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            62% { opacity: 1; transform: scaleY(1.035) translateY(-4px); animation-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
            82% { opacity: 1; transform: scaleY(0.995) translateY(1px); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            100% { opacity: 1; transform: scaleY(1) translateY(0); }
          }

          @keyframes p2m-wave-flow {
            0%, 48% { opacity: 0; transform: translateX(-54px) translateY(12px) scaleX(0.86); animation-timing-function: cubic-bezier(0.34, 0, 0.14, 1); }
            75% { opacity: 1; transform: translateX(8px) translateY(-2px) scaleX(1.02); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            100% { opacity: 1; transform: translateX(0) translateY(0) scaleX(1); }
          }

          @keyframes p2m-wave-flow-bottom {
            0%, 54% { opacity: 0; transform: translateX(56px) translateY(18px) scaleX(0.82); animation-timing-function: cubic-bezier(0.34, 0, 0.14, 1); }
            80% { opacity: 1; transform: translateX(-6px) translateY(-2px) scaleX(1.018); animation-timing-function: cubic-bezier(0.16, 1, 0.3, 1); }
            100% { opacity: 1; transform: translateX(0) translateY(0) scaleX(1); }
          }
    }
  </style>
</head>
<body>
  <main id="logo-root" aria-label="Animated logo" data-p2m-duration="1900"></main>

  <section class="atomic-motions" aria-label="Atomic motion studies">
    <div class="atom" data-atom="hover"><div class="atom-stage"></div><span class="atom-label">Hover</span></div>
    <div class="atom" data-atom="pulse"><div class="atom-stage"></div><span class="atom-label">Pulse</span></div>
    <div class="atom" data-atom="arc"><div class="atom-stage"></div><span class="atom-label">Arc</span></div>
    <div class="atom" data-atom="press"><div class="atom-stage"></div><span class="atom-label">Press</span></div>
  </section>

  <div class="principles" id="principlesRow">
    <span class="pill" data-p="squashstretch">Squash &amp; stretch</span>
    <span class="pill" data-p="anticipation">Anticipation</span>
    <span class="pill" data-p="staging">Staging</span>
    <span class="pill" data-p="followthrough">Follow through</span>
    <span class="pill" data-p="overlap">Overlapping</span>
    <span class="pill" data-p="slowinout">Slow in / out</span>
    <span class="pill" data-p="arc">Arc</span>
    <span class="pill" data-p="secondary">Secondary action</span>
    <span class="pill" data-p="timing">Timing</span>
    <span class="pill" data-p="appeal">Appeal</span>
  </div>

  <div class="controls">
    <button class="primary" id="btnReplay" type="button">Replay</button>
    <button id="btnSlow" type="button">Slow motion</button>
    <label class="speed-control" for="speedSlider">
      <span class="speed-caption">Speed</span>
      <input id="speedSlider" type="range" min="0.25" max="2.5" step="0.05" value="0.45" aria-label="Animation speed">
      <span class="speed-value" id="speedValue">0.45x</span>
    </label>
  </div>

  <p class="footer">Click the main logo to replay | Drag speed | Try atomic motions</p>

#blueShade)\" style=\"--i:7\"/>\n    <rect id=\"tower-09\" class=\"tower\" x=\"706\" y=\"350\" width=\"36\" height=\"345\" rx=\"18\" fill=\"url(#blueShade)\" style=\"--i:8\"/>\n    <rect id=\"tower-10\" class=\"tower\" x=\"760\" y=\"420\" width=\"44\" height=\"360\" rx=\"22\" fill=\"url(#blueShade)\" style=\"--i:9\"/>\n    <rect id=\"tower-11\" class=\"tower\" x=\"820\" y=\"602\" width=\"36\" height=\"178\" rx=\"18\" fill=\"url(#blueShade)\" style=\"--i:10\"/>\n    <rect id=\"tower-12\" class=\"tower\" x=\"874\" y=\"596\" width=\"36\" height=\"184\" rx=\"18\" fill=\"url(#blueShade)\" style=\"--i:11\"/>\n    <rect id=\"tower-13\" class=\"tower\" x=\"930\" y=\"592\" width=\"36\" height=\"196\" rx=\"18\" fill=\"url(#blueShade)\" style=\"--i:12\"/>\n    <rect id=\"tower-14\" class=\"tower\" x=\"984\" y=\"580\" width=\"36\" height=\"220\" rx=\"18\" fill=\"url(#blueShade)\" style=\"--i:13\"/>\n      <\/g>\n      <text id=\"year-1943\" x=\"640\" y=\"742\" font-family=\"Arial, Helvetica, sans-serif\" font-size=\"74\" font-weight=\"500\" fill=\"#1452B3\" text-anchor=\"middle\">1943<\/text>\n      <path id=\"wave-top\" class=\"wave\" fill=\"#1452B3\" d=\"M252 819 C356 760 476 782 590 824 C716 870 835 884 1028 806 C956 882 796 931 642 895 C504 861 382 805 252 819 Z\"/>\n      <path id=\"wave-bottom\" class=\"wave\" fill=\"#1452B3\" d=\"M366 903 C496 858 620 903 746 932 C824 950 899 947 972 916 C890 985 748 996 596 950 C500 921 435 892 366 903 Z\"/>\n    <\/g>\n  <\/g>\n<\/svg>\n";
    const SVG_URI = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(SVG_TEXT);
    const DURATION = 1900;

    let playbackRate = 0.45;
    let pulseRaf = null;
    let arcRaf = null;
    window.__p2mReady = false;

    function createSvgNode(node) {
      const element = document.createElementNS(SVG_NS, node.tag);
      for (const [name, value] of Object.entries(node.attrs || {})) {
        element.setAttribute(name, value);
      }
      if (node.text) {
        element.appendChild(document.createTextNode(node.text));
      }
      for (const child of node.children || []) {
        element.appendChild(createSvgNode(child));
      }
      return element;
    }

    function heroAnimations() {
      const root = document.getElementById("logo-root");
      if (root.getAnimations) return root.getAnimations({ subtree: true });
      return document.getAnimations().filter(animation => {
        const target = animation.effect && animation.effect.target;
        return target && root.contains(target);
      });
    }

    function applyPlaybackRate() {
      for (const animation of heroAnimations()) {
        if (animation.updatePlaybackRate) animation.updatePlaybackRate(playbackRate);
        else animation.playbackRate = playbackRate;
      }
    }

    function renderHero() {
      const root = document.getElementById("logo-root");
      root.replaceChildren(createSvgNode(LOGO));
      const svg = root.querySelector("svg");
      if (svg) {
        svg.removeAttribute("width");
        svg.removeAttribute("height");
        svg.style.width = "100%";
        svg.style.height = "auto";
        svg.style.overflow = "visible";
      }
      requestAnimationFrame(() => requestAnimationFrame(applyPlaybackRate));
    }

    function flashPills(...names) {
      document.querySelectorAll(".pill").forEach(pill => pill.classList.remove("active"));
      names.forEach(name => {
        const pill = document.querySelector(`[data-p="${name}"]`);
        if (pill) pill.classList.add("active");
      });
    }

    function cyclePrinciples() {
      const phases = [
        ["staging", "timing"],
        ["anticipation", "squashstretch"],
        ["arc", "slowinout"],
        ["overlap", "followthrough"],
        ["appeal"]
      ];
      let i = 0;
      flashPills(...phases[0]);
      return setInterval(() => {
        i = (i + 1) % phases.length;
        flashPills(...phases[i]);
      }, Math.max(240, DURATION / phases.length / Math.max(playbackRate, 0.25)));
    }

    let pillTimer = null;
    function replayMain() {
      clearInterval(pillTimer);
      renderHero();
      pillTimer = cyclePrinciples();
      setTimeout(() => {
        clearInterval(pillTimer);
        document.querySelectorAll(".pill").forEach(pill => pill.classList.remove("active"));
      }, DURATION / Math.max(playbackRate, 0.25) + 600);
    }

    function formatSpeed(rate) {
      return `${rate.toFixed(2)}x`;
    }

    function updateSpeedUI() {
      const slider = document.getElementById("speedSlider");
      const value = Number(slider.value);
      const min = Number(slider.min);
      const max = Number(slider.max);
      const progress = ((value - min) / (max - min)) * 100;
      document.getElementById("speedValue").textContent = formatSpeed(value);
      slider.style.setProperty("--speed-progress", `${progress}%`);
      const slow = value <= 0.251;
      const btnSlow = document.getElementById("btnSlow");
      btnSlow.textContent = slow ? "Normal speed" : "Slow motion";
      btnSlow.style.background = slow ? "var(--surface)" : "";
      btnSlow.style.borderColor = slow ? "var(--text-secondary)" : "";
    }

    function setPlaybackRate(rate, replay = false) {
      const slider = document.getElementById("speedSlider");
      const min = Number(slider.min);
      const max = Number(slider.max);
      playbackRate = Math.min(max, Math.max(min, Number(rate)));
      slider.value = String(playbackRate);
      updateSpeedUI();
      applyPlaybackRate();
      if (replay) replayMain();
    }

    function setupAtomImages() {
      document.querySelectorAll(".atom-stage").forEach(stage => {
        const img = new Image();
        img.src = SVG_URI;
        img.alt = "";
        stage.appendChild(img);
      });
    }

    function setupAtoms() {
      const hover = document.querySelector('[data-atom="hover"] img');
      const pulse = document.querySelector('[data-atom="pulse"] img');
      const arc = document.querySelector('[data-atom="arc"] img');
      const press = document.querySelector('[data-atom="press"] img');

      hover.parentElement.addEventListener("mouseenter", () => {
        flashPills("squashstretch", "appeal");
        hover.style.transform = "scale(1.08) rotate(-1.5deg)";
      });
      hover.parentElement.addEventListener("mouseleave", () => {
        hover.style.transform = "scale(1)";
      });

      function pulseTick(ts) {
        const p = (Math.sin(ts / 900) + 1) / 2;
        pulse.style.transform = `scale(${1 + 0.1 * p})`;
        pulseRaf = requestAnimationFrame(pulseTick);
      }
      if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        pulseRaf = requestAnimationFrame(pulseTick);
      }

      let arcAngle = -14;
      let arcVel = 0;
      function arcTick() {
        arcVel += (0 - arcAngle) * 0.08;
        arcVel *= 0.86;
        arcAngle += arcVel;
        arc.style.transform = `rotate(${arcAngle}deg)`;
        arcRaf = requestAnimationFrame(arcTick);
      }
      arc.parentElement.addEventListener("mouseenter", () => {
        flashPills("arc", "anticipation", "appeal");
        cancelAnimationFrame(arcRaf);
        arcAngle = 28;
        arcVel = 0;
        arcTick();
      });
      arc.parentElement.addEventListener("mouseleave", () => {
        arcAngle = 0;
      });

      press.parentElement.addEventListener("mousedown", () => {
        flashPills("squashstretch", "anticipation");
        press.style.transform = "scaleX(1.10) scaleY(0.88)";
      });
      ["mouseup", "mouseleave"].forEach(ev => {
        press.parentElement.addEventListener(ev, () => {
          press.style.transform = "scale(1)";
        });
      });
    }

    function applyQaMode() {
      const params = new URLSearchParams(location.search);
      const chromelessMode = params.get("chromeless");
      const requestedSpeed = params.get("speed") || params.get("rate");
      const seekMs = params.get("t");
      const staticMode = params.get("static");
      if (chromelessMode !== null) {
        document.documentElement.classList.add("p2m-chromeless");
      }
      if (requestedSpeed !== null && Number.isFinite(Number(requestedSpeed))) {
        setPlaybackRate(Number(requestedSpeed), false);
      }
      if (seekMs === null && staticMode === null) {
        requestAnimationFrame(() => requestAnimationFrame(() => {
          applyPlaybackRate();
          window.__p2mReady = true;
        }));
        return;
      }

      document.documentElement.classList.add("p2m-chromeless");
      cancelAnimationFrame(pulseRaf);
      cancelAnimationFrame(arcRaf);
      requestAnimationFrame(() => requestAnimationFrame(() => {
        for (const animation of heroAnimations()) {
          if (staticMode !== null) {
            try {
              animation.finish();
            } catch (err) {
              animation.cancel();
            }
          } else {
            animation.pause();
            animation.currentTime = Number(seekMs);
          }
        }
        window.__p2mReady = true;
      }));
    }

    document.getElementById("btnReplay").addEventListener("click", replayMain);
    document.getElementById("logo-root").addEventListener("click", replayMain);
    document.getElementById("speedSlider").addEventListener("input", event => {
      setPlaybackRate(event.target.value, false);
    });
    document.getElementById("btnSlow").addEventListener("click", () => {
      const slow = Number(document.getElementById("speedSlider").value) <= 0.251;
      setPlaybackRate(slow ? 0.45 : 0.25, true);
    });

    setupAtomImages();
    setupAtoms();
    setPlaybackRate(0.45, false);
    renderHero();
    applyQaMode();
  </script>
